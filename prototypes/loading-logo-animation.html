<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rolltop loading animation study</title>
  <style>
    :root {
      color-scheme: light;
      --page: #f2f0eb;
      --paper: #f7faf8;
      --orange: #c46b44;
      --arch: #c56c45;
      --navy: #151f2e;
      --duration: 1350ms;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      background: var(--page);
      color: var(--navy);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      min-height: 100vh;
      min-height: 100dvh;
    }

    .stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    .stage svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: hidden;
    }

    .band,
    .arch {
      transform-box: view-box;
      transform-origin: center;
    }

    .band-top {
      transform: translateY(-70vh);
    }

    .band-bottom {
      transform: translateY(70vh);
    }

    .arch {
      opacity: 0;
      stroke-dasharray: 1;
      stroke-dashoffset: -1;
    }

    .wordmark {
      opacity: 0;
      transform: scale(.78);
      transform-box: fill-box;
      transform-origin: center;
    }

    .is-playing .band-top {
      animation: band-from-top var(--duration) cubic-bezier(.14, .78, .24, 1) both;
    }

    .is-playing .band-bottom {
      animation: band-from-bottom var(--duration) cubic-bezier(.14, .78, .24, 1) both;
    }

    .is-playing .band-top-shape {
      animation: shape-top var(--duration) cubic-bezier(.2, .8, .2, 1) both;
    }

    .is-playing .band-bottom-shape {
      animation: shape-bottom var(--duration) cubic-bezier(.2, .8, .2, 1) both;
    }

    .is-playing .arch {
      animation: draw-arch var(--duration) cubic-bezier(.2, .8, .2, 1) both;
    }

    .is-playing .wordmark {
      animation: wordmark-pop var(--duration) cubic-bezier(.16, .9, .3, 1.12) both;
    }

    .is-playing.is-preview .band,
    .is-playing.is-preview .band-top-shape,
    .is-playing.is-preview .band-bottom-shape,
    .is-playing.is-preview .arch,
    .is-playing.is-preview .wordmark {
      animation-delay: var(--preview-time);
      animation-play-state: paused;
    }

    @keyframes band-from-top {
      0%, 6% {
        transform: translateY(-70vh);
      }
      24%, 100% {
        transform: translateY(0);
      }
    }

    @keyframes band-from-bottom {
      0%, 1% {
        transform: translateY(70vh);
      }
      10%, 100% {
        transform: translateY(0);
      }
    }

    @keyframes shape-top {
      0%, 24% {
        d: path("M33.03185 -180 C21.91169 -179.99976 12.94011 -172.10800 11.30140 -161.51069 L11.30140 29.51287 L30.57464 29.51287 C31.87797 29.51287 33.83279 29.51287 35.13612 29.51287 L54.72200 29.51287 L54.72200 -161.75202 C52.98563 -172.22786 44.06792 -179.99976 33.03237 -180 Z");
      }
      43%, 100% {
        d: path("M33.03185 11.02356 C21.91169 11.02380 12.94011 18.91556 11.30140 29.51287 L11.30140 29.51287 L30.57464 44.40860 C31.87797 45.41591 33.83279 45.41591 35.13612 44.40860 L54.72200 29.27154 L54.72200 29.27154 C52.98563 18.79570 44.06792 11.02380 33.03237 11.02356 Z");
      }
    }

    @keyframes shape-bottom {
      0%, 24% {
        d: path("M54.72200 35.01287 L35.13612 35.01287 C33.83279 35.01287 31.87797 35.01287 30.57464 35.01287 L11.30140 35.01287 L11.30140 35.01287 L11.30140 240 L54.72200 240 L54.72200 35.01287 Z");
      }
      43%, 100% {
        d: path("M54.72200 34.77154 L35.13612 49.90860 C33.83279 50.91591 31.87797 50.91591 30.57464 49.90860 L11.30140 35.01287 L11.30140 35.01287 L11.30140 69.11513 L54.72200 69.11513 L54.72200 34.77154 Z");
      }
    }

    @keyframes draw-arch {
      0%, 44% {
        opacity: 0;
        stroke-dashoffset: -1;
      }
      45% {
        opacity: 1;
        stroke-dashoffset: -1;
      }
      70%, 100% {
        opacity: 1;
        stroke-dashoffset: 0;
      }
    }

    @keyframes wordmark-pop {
      0%, 72% {
        opacity: 0;
        transform: scale(.78);
      }
      82% {
        opacity: 1;
        transform: scale(1.055);
      }
      91%, 100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    footer {
      position: fixed;
      inset: auto 0 0;
      min-height: 76px;
      display: grid;
      place-items: center end;
      padding: 12px max(20px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
    }

    button {
      min-width: 92px;
      min-height: 44px;
      border: 1px solid #b7b3aa;
      border-radius: 6px;
      padding: 10px 16px;
      background: var(--paper);
      color: var(--navy);
      font: inherit;
      font-weight: 650;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--orange);
      background: #fff;
    }

    button:focus-visible {
      outline: 3px solid color-mix(in srgb, var(--orange) 45%, transparent);
      outline-offset: 3px;
    }

    @media (prefers-reduced-motion: reduce) {
      .band {
        transform: none;
        animation: none !important;
      }

      .band-top-shape {
        d: path("M33.03185 11.02356 C21.91169 11.02380 12.94011 18.91556 11.30140 29.51287 L11.30140 29.51287 L30.57464 44.40860 C31.87797 45.41591 33.83279 45.41591 35.13612 44.40860 L54.72200 29.27154 L54.72200 29.27154 C52.98563 18.79570 44.06792 11.02380 33.03237 11.02356 Z");
        animation: none !important;
      }

      .band-bottom-shape {
        d: path("M54.72200 34.77154 L35.13612 49.90860 C33.83279 50.91591 31.87797 50.91591 30.57464 49.90860 L11.30140 35.01287 L11.30140 35.01287 L11.30140 69.11513 L54.72200 69.11513 L54.72200 34.77154 Z");
        animation: none !important;
      }

      .arch {
        opacity: 1;
        stroke-dashoffset: 0;
        animation: none !important;
      }

      .wordmark {
        opacity: 1;
        transform: none;
        animation: none !important;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="stage is-playing" id="stage" aria-label="Animated Rolltop logo">
      <svg viewBox="-57.01423 -171.953274 180.094866 413.021829" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="logo-title">
        <title id="logo-title">Rolltop</title>

        <g class="mark">
          <g class="band band-top" fill="#c46b44">
            <path
              class="band-top-shape"
              d="M33.03185 -180 C21.91169 -179.99976 12.94011 -172.10800 11.30140 -161.51069 L11.30140 29.51287 L30.57464 29.51287 C31.87797 29.51287 33.83279 29.51287 35.13612 29.51287 L54.72200 29.51287 L54.72200 -161.75202 C52.98563 -172.22786 44.06792 -179.99976 33.03237 -180 Z"
            />
          </g>

          <g class="band band-bottom" fill="#151f2e">
            <path
              class="band-bottom-shape"
              d="M54.72200 35.01287 L35.13612 35.01287 C33.83279 35.01287 31.87797 35.01287 30.57464 35.01287 L11.30140 35.01287 L11.30140 35.01287 L11.30140 240 L54.72200 240 L54.72200 35.01287 Z"
            />
          </g>

          <g transform="translate(509.99438 175.90039)">
            <path
              class="arch"
              pathLength="1"
              fill="none"
              style="stroke: var(--arch)"
              stroke-width="5.5"
              stroke-linecap="round"
              d="m-446.67797-109.53511-.008-29.44922v-.002l-.006-3.89258c0-16.75746-13.51402-30.27148-30.27148-30.27148h.00056c-16.75746 0-30.27149 13.51402-30.27149 30.27148l-.006 3.89258v.002l-.004 29.44922"
            />
          </g>
          <image
            class="wordmark"
            href="rolltop-logotype.png"
            x="3.033"
            y="77.5"
            width="60"
            height="17.419"
          />
        </g>
      </svg>
    </div>
  </main>
  <footer>
    <button id="replay" type="button">Replay</button>
  </footer>
  <script>
    const stage = document.getElementById("stage");
    const replay = document.getElementById("replay");
    const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");
    const previewTime = Number(new URLSearchParams(window.location.search).get("time"));
    const animationDuration = 1350;

    if (Number.isFinite(previewTime) && previewTime > 0) {
      stage.style.setProperty("--preview-time", `${-Math.min(previewTime, animationDuration)}ms`);
      stage.classList.add("is-preview");
    }

    function play() {
      if (reducedMotion.matches) return;
      stage.classList.remove("is-preview");
      stage.classList.remove("is-playing");
      void stage.offsetWidth;
      stage.classList.add("is-playing");
    }

    replay.addEventListener("click", play);
  </script>
</body>
</html>
