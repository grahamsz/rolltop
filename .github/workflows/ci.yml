name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test-and-build:
    name: Test, Build, And Report
    runs-on: ubuntu-latest

    steps:
      - name: Check Out
        uses: actions/checkout@v5

      - name: Set Build Metadata
        id: build-meta
        shell: bash
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            version="$GITHUB_REF_NAME"
          else
            version="latest"
          fi
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/rolltop"
          binary="rolltop-${version}-linux-amd64"
          {
            echo "ROLLTOP_VERSION=$version"
            echo "ROLLTOP_BUILD_DATE=$build_date"
            echo "ROLLTOP_IMAGE=$image"
            echo "ROLLTOP_BINARY=$binary"
          } >> "$GITHUB_ENV"
          {
            echo "version=$version"
            echo "build_date=$build_date"
            echo "image=$image"
            echo "binary=$binary"
            echo "docker_tags=${image}:${version}"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare Artifact Directories
        run: |
          mkdir -p test-results build-artifacts
          echo "Rolltop CI test artifacts" > test-results/manifest.txt

      - name: Set Up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set Up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Set Up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set Up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: 8.10.2

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Run TypeScript Checks
        run: |
          mkdir -p test-results
          start=$(date +%s)
          set +e
          npm run typecheck 2>&1 | tee test-results/typescript-typecheck.log
          status=${PIPESTATUS[0]}
          set -e
          elapsed=$(($(date +%s) - start))

          node .github/scripts/typescript-test-report.mjs "$status" "$elapsed" test-results/typescript-typecheck.log test-results
          cat test-results/typescript-test-report.md >> "$GITHUB_STEP_SUMMARY"

          exit "$status"

      - name: Build Frontend
        run: |
          mkdir -p test-results build-artifacts
          set +e
          npm run build:vite 2>&1 | tee test-results/frontend-build.log
          frontend_status=${PIPESTATUS[0]}
          npm run build:plugins 2>&1 | tee test-results/plugin-frontend-build.log
          plugin_status=${PIPESTATUS[0]}
          set -e
          {
            echo "### Frontend Build"
            echo
            if [ "$frontend_status" -eq 0 ] && [ "$plugin_status" -eq 0 ]; then
              echo "Status: pass"
            else
              echo "Status: fail"
            fi
            echo
            echo "Build log: \`test-results/frontend-build.log\`"
            echo "Plugin build log: \`test-results/plugin-frontend-build.log\`"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$frontend_status" -ne 0 ]; then
            exit "$frontend_status"
          fi
          exit "$plugin_status"

      - name: Upload Frontend Build
        uses: actions/upload-artifact@v5
        with:
          name: frontend-dist-${{ steps.build-meta.outputs.version }}
          path: frontend/dist
          if-no-files-found: error

      - name: Build Android App
        id: android-build
        env:
          ROLLTOP_ANDROID_KEYSTORE_BASE64: ${{ secrets.ROLLTOP_ANDROID_KEYSTORE_BASE64 }}
          ROLLTOP_ANDROID_STORE_PASSWORD: ${{ secrets.ROLLTOP_ANDROID_STORE_PASSWORD }}
          ROLLTOP_ANDROID_KEY_ALIAS: ${{ secrets.ROLLTOP_ANDROID_KEY_ALIAS }}
          ROLLTOP_ANDROID_KEY_PASSWORD: ${{ secrets.ROLLTOP_ANDROID_KEY_PASSWORD }}
          ROLLTOP_ANDROID_CERT_SHA256: ${{ secrets.ROLLTOP_ANDROID_CERT_SHA256 }}
        run: |
          mkdir -p build-artifacts/android
          rm -rf frontend/public/android

          export ROLLTOP_ANDROID_VERSION_CODE="$((100000 + GITHUB_RUN_NUMBER))"
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            export ROLLTOP_ANDROID_VERSION_NAME="${GITHUB_REF_NAME#v}"
          else
            export ROLLTOP_ANDROID_VERSION_NAME="0.2.${GITHUB_RUN_NUMBER}"
          fi

          signing_values=0
          for value in \
            "$ROLLTOP_ANDROID_KEYSTORE_BASE64" \
            "$ROLLTOP_ANDROID_STORE_PASSWORD" \
            "$ROLLTOP_ANDROID_KEY_ALIAS" \
            "$ROLLTOP_ANDROID_KEY_PASSWORD" \
            "$ROLLTOP_ANDROID_CERT_SHA256"; do
            if [ -n "$value" ]; then signing_values=$((signing_values + 1)); fi
          done
          if [ "$signing_values" -ne 0 ] && [ "$signing_values" -ne 5 ]; then
            echo "Android release signing is only partially configured." >&2
            exit 1
          fi

          if [ "$signing_values" -eq 5 ]; then
            export ROLLTOP_ANDROID_KEYSTORE_FILE="$RUNNER_TEMP/rolltop-release.jks"
            printf '%s' "$ROLLTOP_ANDROID_KEYSTORE_BASE64" | base64 --decode > "$ROLLTOP_ANDROID_KEYSTORE_FILE"
          fi

          ./android/gradlew -p android :app:testDebugUnitTest :app:lintDebug

          if [ "$signing_values" -eq 5 ]; then
            ./android/gradlew -p android :app:assembleRelease
            apk_path="android/app/build/outputs/apk/release/app-release.apk"
            metadata_path="android/app/build/outputs/apk/release/output-metadata.json"
            artifact_suffix="release"
            echo "server_update=true" >> "$GITHUB_OUTPUT"
          else
            if [ "$GITHUB_REF_TYPE" = "tag" ]; then
              echo "Tagged builds require the five ROLLTOP_ANDROID_* signing secrets." >&2
              exit 1
            fi
            ./android/gradlew -p android :app:assembleDebug
            apk_path="android/app/build/outputs/apk/debug/app-debug.apk"
            metadata_path="android/app/build/outputs/apk/debug/output-metadata.json"
            artifact_suffix="debug"
            echo "server_update=false" >> "$GITHUB_OUTPUT"
          fi

          apksigner_path="$(find "${ANDROID_HOME:?}/build-tools" -mindepth 2 -maxdepth 2 -type f -name apksigner -print | sort -V | tail -n 1)"
          if [ -z "$apksigner_path" ]; then
            echo "Could not locate Android apksigner." >&2
            exit 1
          fi
          "$apksigner_path" verify --verbose --print-certs "$apk_path" | tee build-artifacts/android/apksigner-verification.txt
          if [ "$signing_values" -eq 5 ]; then
            expected_cert="$(printf '%s' "$ROLLTOP_ANDROID_CERT_SHA256" | tr -d '[:space:]:' | tr '[:upper:]' '[:lower:]')"
            actual_cert="$(awk -F ': ' '/certificate SHA-256 digest:/ { print $NF; exit }' build-artifacts/android/apksigner-verification.txt | tr -d '[:space:]:' | tr '[:upper:]' '[:lower:]')"
            if [[ ! "$expected_cert" =~ ^[0-9a-f]{64}$ ]] || [ "$actual_cert" != "$expected_cert" ]; then
              echo "Android APK signer does not match ROLLTOP_ANDROID_CERT_SHA256." >&2
              exit 1
            fi
          fi

          cp "$apk_path" "build-artifacts/android/rolltop-android-${ROLLTOP_VERSION}-${artifact_suffix}.apk"
          version_code="$(jq -r '.elements[0].versionCode' "$metadata_path")"
          version_name="$(jq -r '.elements[0].versionName' "$metadata_path")"
          if [ "$signing_values" -eq 5 ]; then
            mkdir -p frontend/public/android
            cp "$apk_path" frontend/public/android/rolltop.apk
            apk_sha256="$(sha256sum frontend/public/android/rolltop.apk | awk '{print $1}')"
            jq -n \
              --argjson versionCode "$version_code" \
              --arg versionName "$version_name" \
              --arg apkUrl "/android/rolltop.apk" \
              --arg sha256 "$apk_sha256" \
              '{versionCode: $versionCode, versionName: $versionName, apkUrl: $apkUrl, sha256: $sha256}' \
              > frontend/public/android/latest.json
            test "$(jq -r '.versionCode' frontend/public/android/latest.json)" = "$version_code"
            test "$(jq -r '.sha256' frontend/public/android/latest.json)" = "$(sha256sum frontend/public/android/rolltop.apk | awk '{print $1}')"
          fi

          {
            echo "### Android Build"
            echo
            echo "Version: \`${version_name} (${version_code})\`"
            echo "Variant: \`${artifact_suffix}\`"
            if [ "$signing_values" -eq 5 ]; then
              echo "Server self-update: published"
            else
              echo "Server self-update: not published; configure release-signing secrets"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Android App
        uses: actions/upload-artifact@v5
        with:
          name: rolltop-android-${{ steps.build-meta.outputs.version }}
          path: build-artifacts/android/*.apk
          if-no-files-found: error

      - name: Build Plugin Backends
        run: |
          mkdir -p build-artifacts/plugins
          plugins='attachment_preview bimi_brand_icons gravatar_sender_icons language_search mail_filters one_click_unsubscribe remote_image_blocklist trusted_image_sources client_side_pgp mail_mcp'
          for plugin in $plugins; do
            mkdir -p "build-artifacts/plugins/${plugin}/backend"
            CGO_ENABLED=1 GOOS=linux go build -buildmode=plugin -trimpath -ldflags="-s -w" -o "build-artifacts/plugins/${plugin}/backend/${plugin}.so" "./plugins/${plugin}/backend"
          done

      - name: Upload Plugin Backends
        uses: actions/upload-artifact@v5
        with:
          name: plugin-backends-${{ steps.build-meta.outputs.version }}
          path: build-artifacts/plugins
          if-no-files-found: error

      - name: Run Go Tests
        run: |
          mkdir -p test-results
          set +e
          go test -json ./... 2>&1 | tee test-results/go-test.json
          status=${PIPESTATUS[0]}
          set -e

          node .github/scripts/go-test-report.mjs test-results/go-test.json test-results

          if [ "$status" -eq 0 ]; then
            set +e
            go test -covermode=atomic -coverprofile=test-results/go-coverage.out ./... > test-results/go-coverage-run.log 2>&1
            coverage_status=$?
            set -e
            if [ "$coverage_status" -eq 0 ] && [ -s test-results/go-coverage.out ]; then
              go tool cover -func=test-results/go-coverage.out > test-results/go-coverage.txt
              go tool cover -html=test-results/go-coverage.out -o test-results/go-coverage.html
            else
              {
                echo "Go coverage generation failed with exit status $coverage_status."
                echo
                cat test-results/go-coverage-run.log
              } > test-results/go-coverage-error.log
            fi
          else
            echo "Go coverage skipped because tests failed." > test-results/go-coverage-run.log
          fi

          cat test-results/go-test-report.md >> "$GITHUB_STEP_SUMMARY"
          if [ -s test-results/go-coverage.txt ]; then
            {
              echo
              echo "### Go Coverage"
              echo
              echo "\`\`\`"
              tail -n 1 test-results/go-coverage.txt
              echo "\`\`\`"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          exit "$status"

      - name: Generate Go Documentation
        run: |
          mkdir -p godoc
          go list ./... > godoc/packages.txt
          while IFS= read -r pkg; do
            rel="${pkg#rolltop/}"
            out="godoc/${rel}.txt"
            mkdir -p "$(dirname "$out")"
            go doc -all "$pkg" > "$out"
          done < godoc/packages.txt
          package_count=$(wc -l < godoc/packages.txt | tr -d " ")
          {
            echo "### Go Documentation"
            echo
            echo "Packages: ${package_count}"
            echo "Artifact: `godoc-${ROLLTOP_VERSION}`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Go Documentation
        uses: actions/upload-artifact@v5
        with:
          name: godoc-${{ steps.build-meta.outputs.version }}
          path: godoc
          if-no-files-found: error

      - name: Ensure Test Results Artifact Exists
        if: always()
        run: |
          mkdir -p test-results
          if [ ! -e test-results/manifest.txt ]; then
            echo "Rolltop CI test artifacts" > test-results/manifest.txt
          fi

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-results-${{ steps.build-meta.outputs.version }}
          path: test-results
          if-no-files-found: error

      - name: Build Backend Binary
        run: |
          mkdir -p build-artifacts
          CGO_ENABLED=1 GOOS=linux go build -trimpath -ldflags="-s -w -X rolltop/backend/buildinfo.Version=${ROLLTOP_VERSION} -X rolltop/backend/buildinfo.BuildDate=${ROLLTOP_BUILD_DATE} -X rolltop/backend/buildinfo.Commit=${GITHUB_SHA}" -o "build-artifacts/${ROLLTOP_BINARY}" ./cmd/rolltop

      - name: Upload Backend Binary
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.build-meta.outputs.binary }}
          path: build-artifacts/${{ steps.build-meta.outputs.binary }}
          if-no-files-found: error

      - name: Build Docker Image
        run: |
          docker build \
            --build-arg "ROLLTOP_VERSION=${ROLLTOP_VERSION}" \
            --build-arg "ROLLTOP_BUILD_DATE=${ROLLTOP_BUILD_DATE}" \
            --build-arg "ROLLTOP_COMMIT=${GITHUB_SHA}" \
            --label "org.opencontainers.image.title=rolltop" \
            --label "org.opencontainers.image.url=https://rolltop.app" \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.created=${ROLLTOP_BUILD_DATE}" \
            --label "org.opencontainers.image.version=${ROLLTOP_VERSION}" \
            -t "${ROLLTOP_IMAGE}:${ROLLTOP_VERSION}" \
            .

      - name: Verify Docker Android Update Feed
        if: steps.android-build.outputs.server_update == 'true'
        run: |
          container_id="$(docker create "${ROLLTOP_IMAGE}:${ROLLTOP_VERSION}")"
          trap 'docker rm -f "$container_id" >/dev/null' EXIT
          mkdir -p "$RUNNER_TEMP/rolltop-image-android"
          docker cp "$container_id:/app/frontend/dist/android/latest.json" "$RUNNER_TEMP/rolltop-image-android/latest.json"
          docker cp "$container_id:/app/frontend/dist/android/rolltop.apk" "$RUNNER_TEMP/rolltop-image-android/rolltop.apk"

          cmp frontend/public/android/latest.json "$RUNNER_TEMP/rolltop-image-android/latest.json"
          cmp frontend/public/android/rolltop.apk "$RUNNER_TEMP/rolltop-image-android/rolltop.apk"
          expected_sha="$(jq -r '.sha256' "$RUNNER_TEMP/rolltop-image-android/latest.json")"
          actual_sha="$(sha256sum "$RUNNER_TEMP/rolltop-image-android/rolltop.apk" | awk '{print $1}')"
          test "$expected_sha" = "$actual_sha"

          metadata_version="$(jq -r '.versionCode' "$RUNNER_TEMP/rolltop-image-android/latest.json")"
          apk_version="$("${ANDROID_HOME:?}/build-tools/$(ls "${ANDROID_HOME}/build-tools" | sort -V | tail -n 1)/aapt" dump badging "$RUNNER_TEMP/rolltop-image-android/rolltop.apk" | sed -n "s/.*versionCode='\([^']*\)'.*/\1/p" | head -n 1)"
          test "$metadata_version" = "$apk_version"

      - name: Log In To GHCR
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

      - name: Publish Docker Image
        if: github.event_name != 'pull_request'
        run: |
          docker push "${ROLLTOP_IMAGE}:${ROLLTOP_VERSION}"

      - name: Docker Image Summary
        run: |
          {
            echo "### Docker Image"
            echo
            echo "Image: \`${ROLLTOP_IMAGE}:${ROLLTOP_VERSION}\`"
            if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
              echo "Published: no (pull request build)"
            else
              echo "Published: yes"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
