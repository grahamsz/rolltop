name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test-and-build:
    name: Test, Build, And Report
    runs-on: ubuntu-latest

    steps:
      - name: Check Out
        uses: actions/checkout@v4

      - name: Set Build Metadata
        id: build-meta
        shell: bash
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            version="$GITHUB_REF_NAME"
          else
            version="latest"
          fi
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          binary="mailmirror-${version}-linux-amd64"
          {
            echo "MAILMIRROR_VERSION=$version"
            echo "MAILMIRROR_IMAGE=$image"
            echo "MAILMIRROR_BINARY=$binary"
          } >> "$GITHUB_ENV"
          {
            echo "version=$version"
            echo "image=$image"
            echo "binary=$binary"
            echo "docker_tags=${image}:${version}"
          } >> "$GITHUB_OUTPUT"

      - name: Set Up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set Up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Run TypeScript Checks
        run: |
          mkdir -p test-results
          start=$(date +%s)
          set +e
          npm run typecheck 2>&1 | tee test-results/typescript-typecheck.log
          status=${PIPESTATUS[0]}
          set -e
          elapsed=$(($(date +%s) - start))

          node .github/scripts/typescript-test-report.mjs "$status" "$elapsed" test-results/typescript-typecheck.log test-results
          cat test-results/typescript-test-report.md >> "$GITHUB_STEP_SUMMARY"

          exit "$status"

      - name: Build Frontend
        run: |
          mkdir -p test-results build-artifacts
          set +e
          npm run build:vite 2>&1 | tee test-results/frontend-build.log
          status=${PIPESTATUS[0]}
          set -e
          {
            echo "### Frontend Build"
            echo
            if [ "$status" -eq 0 ]; then
              echo "Status: pass"
            else
              echo "Status: fail"
            fi
            echo
            echo "Build log: \`test-results/frontend-build.log\`"
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

      - name: Upload Frontend Build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ steps.build-meta.outputs.version }}
          path: frontend/dist
          if-no-files-found: error

      - name: Run Go Tests
        run: |
          mkdir -p test-results
          set +e
          go test -json ./... 2>&1 | tee test-results/go-test.json
          status=${PIPESTATUS[0]}
          set -e

          node .github/scripts/go-test-report.mjs test-results/go-test.json test-results

          if [ "$status" -eq 0 ]; then
            set +e
            go test -covermode=atomic -coverprofile=test-results/go-coverage.out ./... > test-results/go-coverage-run.log 2>&1
            coverage_status=$?
            set -e
            if [ "$coverage_status" -eq 0 ] && [ -s test-results/go-coverage.out ]; then
              go tool cover -func=test-results/go-coverage.out > test-results/go-coverage.txt
              go tool cover -html=test-results/go-coverage.out -o test-results/go-coverage.html
            else
              {
                echo "Go coverage generation failed with exit status $coverage_status."
                echo
                cat test-results/go-coverage-run.log
              } > test-results/go-coverage-error.log
            fi
          else
            echo "Go coverage skipped because tests failed." > test-results/go-coverage-run.log
          fi

          cat test-results/go-test-report.md >> "$GITHUB_STEP_SUMMARY"
          if [ -s test-results/go-coverage.txt ]; then
            {
              echo
              echo "### Go Coverage"
              echo
              echo "\`\`\`"
              tail -n 1 test-results/go-coverage.txt
              echo "\`\`\`"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          exit "$status"

      - name: Generate Go Documentation
        run: |
          mkdir -p godoc
          go list ./... > godoc/packages.txt
          while IFS= read -r pkg; do
            rel="${pkg#mailmirror/}"
            out="godoc/${rel}.txt"
            mkdir -p "$(dirname "$out")"
            go doc -all "$pkg" > "$out"
          done < godoc/packages.txt
          package_count=$(wc -l < godoc/packages.txt | tr -d " ")
          {
            echo "### Go Documentation"
            echo
            echo "Packages: ${package_count}"
            echo "Artifact: `godoc-${MAILMIRROR_VERSION}`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Go Documentation
        uses: actions/upload-artifact@v4
        with:
          name: godoc-${{ steps.build-meta.outputs.version }}
          path: godoc
          if-no-files-found: error

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ steps.build-meta.outputs.version }}
          path: test-results
          if-no-files-found: error

      - name: Build Backend Binary
        run: |
          mkdir -p build-artifacts
          CGO_ENABLED=1 GOOS=linux go build -trimpath -ldflags="-s -w" -o "build-artifacts/${MAILMIRROR_BINARY}" ./cmd/mailmirror

      - name: Upload Backend Binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build-meta.outputs.binary }}
          path: build-artifacts/${{ steps.build-meta.outputs.binary }}
          if-no-files-found: error

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log In To GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build And Publish Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.build-meta.outputs.docker_tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.build-meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker Image Summary
        run: |
          {
            echo "### Docker Image"
            echo
            echo "Image: \`${MAILMIRROR_IMAGE}:${MAILMIRROR_VERSION}\`"
            if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
              echo "Published: no (pull request build)"
            else
              echo "Published: yes"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
